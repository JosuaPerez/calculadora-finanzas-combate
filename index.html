<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financiera - Modo Guerra</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container" id="mainCalculator">
        <h1>🛡️ Finanzas de Combate</h1>

        <div class="input-group">
            <label>1. ¿Cuánto cobraste?</label>
            <div class="input-wrapper">
                <span>RD$</span>
                <input type="number" id="income" placeholder="0.00">
            </div>
        </div>

        <div class="custom-distribution">
            <label>2. Desglosa tus Gastos Fijos</label>
            <small>Casa, comida, luz... Ingresa el monto (RD$).</small>

            <div id="fixedContainer"></div>

            <button type="button" id="addFixedBtn" class="secondary-btn">+ Añadir Gasto Fijo</button>
            <div class="live-summary">Total Fijos: RD$ <span id="liveFixedTotal">0.00</span> <span class="badge-global"
                    id="liveFixedPercent">(0% del ingreso)</span></div>
        </div>

        <div class="mode-selector">
            <label class="switch-label">
                <input type="checkbox" id="debtFreeMode">
                <span class="slider"></span>
                <span class="label-text">¿Ya pagaste todas tus deudas?</span>
            </label>
            <small style="margin-left: 32px; margin-top: 5px;">Esto cargará una plantilla diferente abajo 👇</small>
        </div>

        <div class="custom-distribution" id="distributionSection">
            <label>3. Distribuye el Sobrante</label>
            <small>Ingresa el monto (RD$). Te mostraremos el % que representa.</small>

            <div class="live-summary highlight-box" id="remainingBox">
                Sobrante disponible: RD$ <span id="liveRemaining">0.00</span>
            </div>

            <div id="distributionControls">
                <div id="categoryContainer"></div>
                <button type="button" id="addCategoryBtn" class="secondary-btn">+ Añadir Categoría</button>
                <div id="amountWarning" class="warning-text"></div>
            </div>

            <div id="noSurplusMessage" class="warning-text" style="display: none; font-size: 1rem; margin-top: 15px;">
            </div>
        </div>

        <button id="calculateBtn">Generar Reporte Visual</button>

        <div id="results" class="result-section">
            <div id="captureArea">
                <div id="statusMessage"></div>
                <div id="breakdown"></div>
            </div>

            <div class="action-buttons">
                <button id="downloadCsvBtn" class="action-btn csv">📊 Exportar a Excel (CSV)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
